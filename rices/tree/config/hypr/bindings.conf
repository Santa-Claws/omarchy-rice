# -------------------------------------------------------
# ML4W keybindings adapted for Omarchy
# -------------------------------------------------------

# Applications
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify "uwsm-app -- spotify --force-device-scale-factor=0.7"
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# Web apps
# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# -------------------------------------------------------
# ML4W overrides — unbind conflicting Omarchy defaults
# -------------------------------------------------------

# Close window: ML4W SUPER+Q (was SUPER+W)
unbind = SUPER, W
bindd = SUPER, Q, Close window, killactive,
bindd = SUPER SHIFT, Q, Kill window process, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill

# Maximize: ML4W SUPER+M
bindd = SUPER, M, Maximize window, fullscreen, 1

# All windows float: ML4W SUPER+SHIFT+T
bindd = SUPER SHIFT, T, All windows float, workspaceopt, allfloat

# Resize with SHIFT+arrows (ML4W) — unbind Omarchy's swap-on-SHIFT+arrows
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
bindd = SUPER SHIFT, RIGHT, Increase window width, resizeactive, 100 0
bindd = SUPER SHIFT, LEFT, Decrease window width, resizeactive, -100 0
bindd = SUPER SHIFT, DOWN, Increase window height, resizeactive, 0 100
bindd = SUPER SHIFT, UP, Decrease window height, resizeactive, 0 -100

# Swap with ALT+arrows (ML4W) — unbind Omarchy's moveintogroup-on-ALT+arrows
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN
bindd = SUPER ALT, LEFT, Swap window left, swapwindow, l
bindd = SUPER ALT, RIGHT, Swap window right, swapwindow, r
bindd = SUPER ALT, UP, Swap window up, swapwindow, u
bindd = SUPER ALT, DOWN, Swap window down, swapwindow, d

# Swapsplit: ML4W SUPER+K (was: show keybindings)
unbind = SUPER, K
bindd = SUPER, K, Swap split, swapsplit,

# App launcher: ML4W SUPER+CTRL+RETURN and SUPER+R
bindd = SUPER CTRL, RETURN, Launch apps, exec, omarchy-launch-walker
bindd = SUPER, R, Launch apps, exec, omarchy-launch-walker

# Show keybindings: ML4W SUPER+CTRL+K (maps to omarchy's keybinding viewer)
bindd = SUPER CTRL, K, Show key bindings, exec, omarchy-menu-keybindings

# Clipboard: ML4W SUPER+V
bindd = SUPER, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Emoji picker: ML4W SUPER+CTRL+E (same as Omarchy default already)

# Calculator: ML4W SUPER+CTRL+C
bindd = SUPER CTRL, C, Calculator, exec, gnome-calculator

# Reload Hyprland: ML4W SUPER+CTRL+R
bindd = SUPER CTRL, R, Reload Hyprland config, exec, hyprctl reload

# Screenshot: ML4W SUPER+PRINT (maps to omarchy screenshot tool)
# Note: bare PRINT is already bound in Omarchy default; SUPER+PRINT replaces color picker
unbind = SUPER, PRINT
bindd = SUPER, PRINT, Screenshot, exec, omarchy-cmd-screenshot

# Logout/system menu: ML4W SUPER+CTRL+Q
bindd = SUPER CTRL, Q, System menu, exec, omarchy-menu system

# Waybar: ML4W SUPER+CTRL+B = toggle, SUPER+SHIFT+B conflicts with reload so skip reload
bindd = SUPER CTRL, B, Toggle waybar, exec, omarchy-toggle-waybar

# Theme/background: ML4W SUPER+CTRL+T and SUPER+CTRL+W
unbind = SUPER CTRL, T
unbind = SUPER CTRL, W
bindd = SUPER CTRL, T, Theme menu, exec, omarchy-menu theme
bindd = SUPER CTRL, W, Background menu, exec, omarchy-menu background

# Zoom display: ML4W SUPER+SHIFT+Z = reset zoom
bindd = SUPER SHIFT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock: ML4W SUPER+CTRL+L, also keep SUPER+L for convenience
unbind = SUPER, L
bindd = SUPER, L, Lock system, exec, omarchy-lock-screen
bindd = SUPER CTRL, L, Lock system, exec, omarchy-lock-screen

# Workspace layout toggle moved off SUPER+L → SUPER+SHIFT+L
bindd = SUPER SHIFT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
